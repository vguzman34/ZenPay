services:
  postgres:
    image: postgres:16
    container_name: zenpay-postgres
    environment:
      POSTGRES_DB: zenpay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zenpay-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenpay-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zenpay
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ZenPaySecretKey2024SuperSecureKeyForJWTTokenGenerationAndValidation
      SPRING_FLYWAY_VALIDATE-ON-MIGRATE: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
